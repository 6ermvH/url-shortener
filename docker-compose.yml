name: url-shortener

services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - STORAGE=postgres
      - DSN=postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable
    ports:
      - '127.0.0.1:8080:8080'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
